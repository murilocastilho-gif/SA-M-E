<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link rel="stylesheet" href="../assets/style/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow box">

        <h2 class="text-center mb-3">Login</h2>

        <form id="loginForm">
            <input type="email" id="email" class="form-control mb-3" placeholder="Email">
            <input type="password" id="senha" class="form-control mb-3" placeholder="Senha">

            <button class="btn btn-primary w-100">Entrar</button>
        </form>

        <p class="text-center mt-3">
            <a href="tela-cadastro-user.html">Criar conta</a>
        </p>

    </div>
</div>

<script src="../script/validacao.js"></script>
</body>
</html>
