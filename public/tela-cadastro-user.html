<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro</title>

<link rel="stylesheet" href="../assets/style/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow box">

        <h2 class="text-center mb-3">Cadastro</h2>

        <form id="cadastroForm">
            <input type="text" id="nome" class="form-control mb-2" placeholder="Nome">
            <input type="email" id="emailCad" class="form-control mb-2" placeholder="Email">
            <input type="password" id="senhaCad" class="form-control mb-2" placeholder="Senha">
            <input type="password" id="confirmarSenha" class="form-control mb-2" placeholder="Confirmar Senha">

            <button class="btn btn-success w-100">Cadastrar</button>
        </form>

        <p class="text-center mt-3">
            <a href="tela-login.html">Voltar</a>
        </p>

    </div>
</div>

<script src="../script/validacao.js"></script>
</body>
</html>
